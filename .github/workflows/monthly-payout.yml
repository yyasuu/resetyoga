name: Monthly Payout Summary

on:
  # Runs at 09:00 UTC on the 25th of every month
  schedule:
    - cron: '0 9 25 * *'

  # Allow manual trigger from GitHub Actions UI (for testing)
  workflow_dispatch:

jobs:
  send-payout-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monthly payout summary email
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/monthly-payout")

          echo "HTTP status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "::error::Payout summary request failed with HTTP $RESPONSE"
            exit 1
          fi
